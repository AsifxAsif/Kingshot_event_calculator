	<body>
		<!-- Loading Overlay -->

					</path>
					<path class="line" d="M7 16 27 16"></path>
				</svg>
			</label>
			<div class="nav-links" id="navLinks">
				<a href="index.html" class="nav-link active" aria-current="page">VAULT</a>
				<a href="buildings.html" class="nav-link">BUILDINGS</a>
				<a href="war-academy.html" class="nav-link">WAR ACADEMY</a>
				<a href="widgets.html" class="nav-link">WIDGETS</a>
				<a href="heroes.html" class="nav-link">HEROES</a>
				<a href="hero-gear.html" class="nav-link">HERO GEAR</a>
				<a href="gov-gear.html" class="nav-link">GOV GEAR</a>
				<a href="gov-charm.html" class="nav-link">GOV CHARM</a>

			</div>
			<div class="scoreboard-total">
				<div class="scoreboard">
					<div class="lcd-label">Strongest Governor</div>
					<div class="lcd-value" id="globalTotalScoreDisplay">0</div>
				</div>
			</div>
			<div class="preset-controls">
				<button class="action_has has_saved preset-hamburger" aria-label="Preset Menu" type="button" onclick="togglePresetMenu()">
					<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor" fill="none">
						<path d="m19,21H5c-1.1,0-2-.9-2-2V5c0-1.1.9-2,2-2h11l5,5v11c0,1.1-.9,2-2,2Z"></path>
						<path d="M7 3L7 8L15 8"></path>
						<path d="M17 20L17 13L7 13L7 20"></path>
					</svg>
				</button>
				<div class="preset-dropdown" id="presetDropdown">
					<select id="presetSelect" class="preset-select" onchange="loadPreset(this.value)"></select>
					<button class="preset-btn" onclick="createNewPreset()" title="Create New Preset"><i class="fas fa-plus"></i> New</button>
					<button class="preset-btn" onclick="updatePreset(currentPreset)" title="Update Current Preset"><i class="fa-regular fa-floppy-disk"></i> Update</button>
					<button class="preset-btn btn-delete" onclick="deletePreset(currentPreset)" title="Delete Preset"><i class="fa-regular fa-trash-can"></i> Delete</button>
					<button class="btn-reset" onclick="resetWithConfirmation()"><i class="fa-solid fa-rotate-left"></i> Reset</button>
				</div>
			</div>
		</div>
		<div class="app-container">
			<div class="vault-section">
				<h2><img src="assets/vault_icon.webp" onerror="this.style.display='none';" style="height:24px;width:24px;vertical-align:middle;margin-right:8px;" alt="Vault"> RESOURCE VAULT</h2>
				<div class="vault-grid" id="vaultContainer"></div>
			</div>
		</div>
		<script src="js/app.js"></script>
		<script>
			function buildVaultUI() {
				const container = document.getElementById("vaultContainer");
				if (!container) return;
				container.innerHTML = "";
				for (const item of RESOURCE_ITEMS) {
					const saved = localStorage.getItem(`vault_${item.id}`) || "";
					const img = getImageFileName(item.id);
					container.innerHTML += `<div class="vault-item">
                    <div class="vault-label">
                        <img loading="lazy" decoding="async" src="${img}" onerror="this.style.display='none';" alt="${item.id}">
                        <label>${item.id.replace(/_/g, " ")}</label>
                    </div>
                    <input type="text" id="vault_${item.id}" value="${saved}" placeholder="e.g., ${item.placeholder}" oninput="validateVaultInput(this); updateVaultResource('${item.id}', this.value)" onblur="validateVaultInput(this); updateGlobalTotalScore()">
                </div>`;
				}
			}

			function validateVaultInput(input) {
				if (input.id.includes('speedup')) {
					let value = input.value;
					value = value.replace(/^-\s*/, '');
					value = value.replace(/-\s*(\d+)/g, '$1');
					input.value = value;
				} else {
					let value = input.value.replace(/-/g, '');
					if (!value.match(/[KMBkmb]/)) {
						value = value.replace(/[^0-9.]/g, '');
					}
					input.value = value;
				}
			}
			window.validateVaultInput = validateVaultInput;
			window.addEventListener("DOMContentLoaded", async () => {
				showLoading();
				loadPresetsFromStorage();
				initializeInputValidation();
				buildVaultUI();
				await loadGameData(["Points"]);
				setTimeout(() => {
					if (currentPreset && allPresets[currentPreset]) {
						applyPresetToCurrentPage(allPresets[currentPreset]);
					}
					if (typeof updateGlobalTotalScore === 'function') {
						updateGlobalTotalScore();
					}
					hideLoading();
				}, 150);
				window.addEventListener("vaultUpdate", () => {
					if (typeof updateGlobalTotalScore === 'function') {
						setTimeout(updateGlobalTotalScore, 50);
					}
				});
				window.addEventListener("storage", event => {
					if (event.key && event.key.startsWith("vault_")) {
						const input = document.getElementById(event.key);
						if (input && input.value !== event.newValue) {
							input.value = event.newValue || "";
						}
						window.dispatchEvent(new Event("vaultUpdate"));
					}
				});
			});

		</script>
	</body>

</html>
